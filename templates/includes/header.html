<!-- Header -->
<header class="bg-white shadow-sm border-b border-gray-200">
    <div class="flex items-center justify-between px-6 py-3">
        <!-- Left side -->
        <div class="flex items-center">
            <!-- Mobile menu button -->
            <button id="sidebarToggle" class="md:hidden mr-4 text-gray-500 hover:text-gray-700 focus:outline-none">
                <i class="fas fa-bars text-xl"></i>
            </button>
            
            <!-- Page title -->
            <h1 class="text-xl font-semibold text-gray-800">
                {% block page_title %}{% endblock %}
            </h1>
        </div>
        
        <!-- Right side -->
        <div class="flex items-center space-x-4">
            <!-- Search (global) -->
            <div class="hidden md:flex items-center">
                <div class="relative">
                    <input type="text" 
                           placeholder="Buscar..." 
                           class="w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-search text-gray-400"></i>
                    </div>
                </div>
            </div>
            
            <!-- Notifications -->
            <div class="relative">
                <button class="relative p-2 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <i class="fas fa-bell text-lg"></i>
                    <span class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-red-600 rounded-full">
                        3
                    </span>
                </button>
            </div>
            
            <!-- Quick actions -->
            <div class="relative" x-data="{ open: false }">
                <button @click="open = !open" 
                        class="p-2 text-gray-500 hover:text-gray-700 focus:outline-none">
                    <i class="fas fa-plus-circle text-lg"></i>
                </button>
                <div x-show="open" 
                     @click.away="open = false"
                     x-transition
                     class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
                    <a href="{% url 'activos:activo_create' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        <i class="fas fa-box mr-2"></i>Nuevo Activo
                    </a>
                    <a href="{% url 'mantenimiento:mantenimiento_quick_create' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        <i class="fas fa-tools mr-2"></i>Nuevo Mantenimiento
                    </a>
                    <a href="{% url 'activos:equipofuncional_create' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        <i class="fas fa-cogs mr-2"></i>Nuevo Equipo
                    </a>
                </div>
            </div>
            
            <!-- User menu -->
            <div class="relative" x-data="{ open: false }">
                <button @click="open = !open" 
                        class="flex items-center space-x-2 focus:outline-none">
                    <div class="w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center">
                        <i class="fas fa-user text-white text-sm"></i>
                    </div>
                    <span class="hidden md:block text-sm font-medium text-gray-700">
                        {{ request.user.username }}
                    </span>
                    <i class="fas fa-chevron-down text-xs text-gray-500"></i>
                </button>
                <div x-show="open" 
                     @click.away="open = false"
                     x-transition
                     class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
                    <a href="{% url 'password_change' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        <i class="fas fa-key mr-2"></i>Cambiar Contraseña
                    </a>
                    <div class="border-t border-gray-200 my-1"></div>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                            <i class="fas fa-sign-out-alt mr-2"></i>Cerrar Sesión
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</header>
